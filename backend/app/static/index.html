<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recruitment Screening Multi-Agent System</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <p class="eyebrow">Recruitment AI</p>
        <h1>Recruitment Screening Multi-Agent System</h1>
        <p>
          Paste one job description, add multiple resumes, and let six collaborating agents parse,
          match, rank, question, and validate the shortlist.
        </p>
      </header>

      <main class="layout">
        <section class="card">
          <h2>Recruiter Input</h2>
          <form id="screening-form">
            <label>
              Job title
              <input type="text" name="job_title" value="Python Backend Developer" />
            </label>
            <label>
              Job description
              <textarea name="job_description" rows="8">We are hiring a Python Backend Developer with FastAPI, SQL, Docker, REST API development, and 2+ years of experience. The candidate should be comfortable building scalable backend services, debugging APIs, and collaborating with product teams.</textarea>
            </label>
            <label>
              Candidate resumes
              <textarea id="resumes-input" rows="16">=== CANDIDATE: C1 ===
Aarav Mehta
aarav@example.com
Skills: Python, FastAPI, SQL, Docker, REST API, Git
Experience: 3 years backend development
Projects: Built microservices using FastAPI and PostgreSQL for an internal operations platform.
Education: B.Tech in Computer Science

=== CANDIDATE: C2 ===
Priya Singh
priya@example.com
Skills: Python, Flask, MySQL, Excel, Git
Experience: 1 year internship and 1 year full-time
Projects: Created reporting APIs in Flask and worked with dashboards.
Education: B.E. Information Technology</textarea>
            </label>
            <button type="submit">Screen Candidates</button>
          </form>
        </section>

        <section class="card">
          <h2>Result Summary</h2>
          <p id="summary-text">Run screening to see ranked candidates.</p>
          <div id="results"></div>
        </section>
      </main>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
  </html>
